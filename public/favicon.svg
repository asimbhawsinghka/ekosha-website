<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- White background so ring is visible -->
  <circle cx="32" cy="32" r="32" fill="white"/>
  <!-- Navy ring matching the logo border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#0D3B66" stroke-width="5"/>
  <!-- Gold tree trunk -->
  <rect x="30.5" y="41" width="3" height="9" rx="1.5" fill="#C9A227"/>
  <!-- Gold foliage: layered leaf clusters -->
  <!-- Bottom left leaf -->
  <ellipse cx="22" cy="38" rx="6" ry="5" fill="#C9A227"/>
  <!-- Bottom right leaf -->
  <ellipse cx="42" cy="38" rx="6" ry="5" fill="#C9A227"/>
  <!-- Mid left leaf -->
  <ellipse cx="20" cy="30" rx="6" ry="5" fill="#C9A227"/>
  <!-- Mid right leaf -->
  <ellipse cx="44" cy="30" rx="6" ry="5" fill="#C9A227"/>
  <!-- Upper left leaf -->
  <ellipse cx="24" cy="23" rx="6" ry="5" fill="#C9A227"/>
  <!-- Upper right leaf -->
  <ellipse cx="40" cy="23" rx="6" ry="5" fill="#C9A227"/>
  <!-- Center top leaf -->
  <ellipse cx="32" cy="18" rx="6" ry="5.5" fill="#C9A227"/>
  <!-- Center mid (fills gaps) -->
  <ellipse cx="32" cy="28" rx="7" ry="9" fill="#C9A227"/>
</svg>
